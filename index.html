<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Priorix — Premium ToDo App Features For Free</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/main.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js"
      }
    }
  </script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Poppins', sans-serif;
      transition: background 0.3s ease, color 0.2s ease;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Light theme (default) */
    body.light {
      background: #f1f5f9;
      color: #0f172a;
    }
    body.dark {
      background: #0a0f1c;
      color: #f1f5f9;
    }

    /* Splash screen — fullscreen overlay, centered */
    .splash-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit; /* will match body background via light/dark */
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5000;
      backdrop-filter: blur(6px);
      transition: opacity 0.35s ease;
      opacity: 1;
    }
    body.light .splash-screen {
      background: #f1f5f9;
    }
    body.dark .splash-screen {
      background: #0a0f1c;
    }
    .splash-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .splash-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }
    .splash-logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      filter: drop-shadow(0 8px 18px rgba(249,115,22,0.25));
      margin-bottom: 0.75rem;
      animation: floatLogo 2.2s infinite ease-in-out;
    }
    .splash-title {
      font-weight: 800;
      font-size: 3.2rem;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #1e293b, #f97316);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      line-height: 1.2;
      margin-bottom: 0.5rem;
    }
    body.dark .splash-title {
      background: linear-gradient(135deg, #facc15, #f97316);
      -webkit-background-clip: text;
      background-clip: text;
    }
    .splash-motto {
      font-size: 0.9rem;
      font-weight: 500;
      background: rgba(249,115,22,0.12);
      padding: 0.4rem 1.2rem;
      border-radius: 3rem;
      color: #1e293b;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(249,115,22,0.2);
    }
    body.dark .splash-motto {
      color: #f1f5f9;
      background: rgba(249,115,22,0.18);
    }
    .splash-loader {
      margin-top: 2rem;
      width: 36px;
      height: 36px;
      border: 3px solid rgba(249,115,22,0.2);
      border-top: 3px solid #f97316;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes floatLogo {
      0% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
      100% { transform: translateY(0); }
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    
    /* Smaller splash for mobile */
    @media (max-width: 480px) {
      .splash-logo { width: 70px; height: 70px; }
      .splash-title { font-size: 2.4rem; }
      .splash-motto { font-size: 0.8rem; }
    }

    /* Fix for calendar day headers in dark mode */
    body.dark .fc .fc-col-header-cell-cushion,
    body.dark .fc .fc-daygrid-day-number,
    body.dark .fc .fc-toolbar-title,
    body.dark .fc .fc-button {
      color: #f1f5f9 !important;
    }
    body.dark .fc-theme-standard td, 
    body.dark .fc-theme-standard th,
    body.dark .fc-theme-standard .fc-scrollgrid {
      border-color: #334155 !important;
    }
    body.dark .fc .fc-daygrid-day.fc-day-today {
      background-color: #1e293b !important;
    }

    /* Brand styling with logo */
    .brand-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .brand-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(249,115,22,0.2));
    }
    .brand-gradient {

      font-size: 1.6rem;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #1e293b, #f97316);

      background-clip: text;
      color: transparent;

    body.dark .brand-gradient {

    .auth-brand {

    .input-field {
      margin-bottom: 1.2rem;
    }
    .input-field label {
      display: block;
      margin-bottom: 0.4rem;
      font-weight: 500;
      font-size: 0.8rem;

    }
    body.dark .input-field label {

    .input-field input {

    }
    .btn-primary {

    .switch-text {

    /* Main App Layout */
    .app-main {

      padding: 1rem;
      width: 100%;
      flex: 1;

      flex-direction: column;

    /* Navbar */
    .navbar {

      align-items: center;

    .navbar-right {

    .user-section {

      align-items: center;
      gap: 0.6rem;
      background: #f1f5f9;
      padding: 0.3rem 0.8rem 0.3rem 1rem;

    }
    body.dark .user-section {
      background: #0f172a;

    #userNameDisplay {

      font-size: 0.85rem;
    }
    body.dark #userNameDisplay {
      color: #f1f5f9;
    }
    .logout-btn, .settings-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .settings-btn {
      color: #64748b;
    }
    body.dark .settings-btn {
      color: #cbd5e1;
    }
    .theme-toggle {
      background: #e2e8f0;
      border: none;
      border-radius: 2.5rem;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    body.dark .theme-toggle {
      background: #334155;
      color: #facc15;
    }

    /* Profile dropdown */
    .profile-dropdown {
      position: absolute;
      top: 45px;
      right: 0;
      background: white;
      border-radius: 1rem;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      min-width: 200px;
      z-index: 200;
      overflow: hidden;
      border: 1px solid #eef2ff;
    }
    body.dark .profile-dropdown {
      background: #1e293b;
      border-color: #334155;
    }
    .profile-dropdown-item {
      padding: 0.8rem 1.2rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.1s;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }
    .profile-dropdown-item:hover {
      background: #f1f5f9;
    }
    body.dark .profile-dropdown-item:hover {
      background: #0f172a;
    }
    .profile-dropdown-item i {
      width: 20px;
      color: #f97316;
    }

    /* Floating Create Task Button */
    .create-task-button-container {
      margin-bottom: 1rem;
      width: 100%;
    }
    .floating-create-btn {
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: white;
      border: none;
      border-radius: 3rem;
      padding: 0.75rem 1.5rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(249,115,22,0.3);
    }

    /* View Tabs */
    .view-tabs {
      display: flex;
      gap: 0.5rem;
      background: white;
      padding: 0.4rem;
      border-radius: 1rem;
      width: 100%;
      margin-bottom: 1.5rem;
      overflow-x: auto;
      scrollbar-width: thin;
      -webkit-overflow-scrolling: touch;
      flex-shrink: 0;
    }
    body.dark .view-tabs {
      background: #1e293b;
    }
    .view-btn {
      padding: 0.5rem 1rem;
      border-radius: 0.8rem;
      border: none;
      background: transparent;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      color: #475569;
      font-size: 0.85rem;
      white-space: nowrap;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    body.dark .view-btn {
      color: #cbd5e1;
    }
    .view-btn.active {
      background: #f97316;
      color: white;
    }

    /* Dashboard Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      flex: 1;
      min-height: 0;
    }
    @media (min-width: 768px) {
      .dashboard-grid {
        grid-template-columns: 360px 1fr;
      }
      .app-main {
        padding: 1.5rem;
      }
      .brand-gradient {
        font-size: 1.8rem;
      }
      .brand-logo {
        width: 40px;
        height: 40px;
      }
      .create-task-button-container {
        display: none;
      }
    }
    
    .create-card, .tasks-panel {
      background: white;
      border-radius: 1.2rem;
      padding: 1.2rem;
      border: 1px solid #edf2f7;
      overflow-x: hidden;
      width: 100%;
    }
    body.dark .create-card, body.dark .tasks-panel {
      background: #1e293b;
      border-color: #334155;
    }
    
    .section-title {
      font-weight: 600;
      margin-bottom: 1rem;
      color: #0f172a;
      font-size: 1rem;
    }
    body.dark .section-title {
      color: #f1f5f9;
    }
    .task-input-modern {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid #e2e8f0;
      border-radius: 0.9rem;
      font-family: 'Poppins', sans-serif;
      margin-bottom: 0.9rem;
      background: white;
      color: #0f172a;
      font-size: 0.9rem;
    }
    body.dark .task-input-modern {
      background: #0f172a;
      border-color: #475569;
      color: #f1f5f9;
    }
    .helper-text {
      font-size: 0.65rem;
      color: #64748b;
      margin-top: -0.6rem;
      margin-bottom: 0.8rem;
    }
    .task-item {
      background: #fafcff;
      border: 1px solid #eef2ff;
      border-radius: 0.9rem;
      padding: 0.9rem;
      margin-bottom: 0.7rem;
      cursor: pointer;
      transition: 0.15s;
      width: 100%;
      overflow-x: hidden;
    }
    body.dark .task-item {
      background: #0f172a;
      border-color: #334155;
    }
    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .task-title-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      flex: 1;
      min-width: 0;
    }
    .task-check {
      width: 18px;
      height: 18px;
      cursor: pointer;
      flex-shrink: 0;
    }
    .task-name {
      font-weight: 600;
      color: #0f172a;
      font-size: 0.9rem;
      word-break: break-word;
      flex: 1;
    }
    body.dark .task-name {
      color: #f1f5f9;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.5rem;
      font-size: 0.65rem;
      color: #64748b;
    }
    .meta-tag {
      background: #f1f5f9;
      padding: 0.15rem 0.5rem;
      border-radius: 1rem;
      color: #334155;
    }
    body.dark .meta-tag {
      background: #334155;
      color: #cbd5e1;
    }
    .delete-task {
      background: none;
      border: none;
      cursor: pointer;
      color: #94a3b8;
      font-size: 0.9rem;
      flex-shrink: 0;
      padding: 0 4px;
    }
    .delete-task:hover {
      color: #ef4444;
    }
    
    /* Kanban - Vertical */
    .kanban-vertical {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
      width: 100%;
    }
    .kanban-col-vertical {
      background: #f8fafc;
      border-radius: 1rem;
      padding: 1rem;
      width: 100%;
    }
    body.dark .kanban-col-vertical {
      background: #0f172a;
    }
    .kanban-col-vertical h4 {
      color: #0f172a;
      margin-bottom: 0.8rem;
      font-size: 1rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e2e8f0;
    }
    body.dark .kanban-col-vertical h4 {
      color: #f1f5f9;
      border-bottom-color: #334155;
    }
    .kanban-task-list {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .kanban-task-card {
      background: white;
      border-radius: 0.8rem;
      padding: 0.8rem;
      cursor: pointer;
      transition: 0.15s;
      border: 1px solid #eef2ff;
    }
    body.dark .kanban-task-card {
      background: #1e293b;
      border-color: #334155;
    }
    
    /* Calendar */
    .calendar-wrapper {
      width: 100%;
      overflow-x: auto;
    }
    #fullcalendarEl {
      font-size: 0.8rem;
      min-width: 300px;
    }
    .fc .fc-toolbar {
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .fc .fc-toolbar-title {
      font-size: 1rem !important;
    }
    .fc .fc-button {
      padding: 0.3rem 0.6rem !important;
      font-size: 0.7rem !important;
    }
    
    /* Modal */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 1rem;
    }
    .modal-content {
      background: white;
      max-width: 460px;
      width: 90%;
      border-radius: 1.5rem;
      padding: 1.5rem;
      position: relative;
      max-height: 85vh;
      overflow-y: auto;
    }
    body.dark .modal-content {
      background: #1e293b;
      color: #f1f5f9;

    .modal-actions {
      display: flex;
      gap: 0.8rem;

      flex-wrap: wrap;
    }

      flex: 1;
      padding: 0.6rem;
      border-radius: 0.9rem;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      font-size: 0.85rem;
    }
    .btn-done { background: #10b981; color: white; }
    .btn-delete-modal { background: #ef4444; color: white; }
    .btn-close { background: #64748b; color: white; }
    .close-modal-icon {
      position: absolute;
      top: 0.8rem;
      right: 1rem;
      font-size: 1.5rem;
      cursor: pointer;
    }
    
    /* Global Footer */
    .global-footer {
      background-color: #000000;
      color: #e2e8f0;
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      width: 100%;
      margin-top: auto;
      flex-shrink: 0;
    }
    
    .hidden { display: none; }
    .error-msg {
      color: #ef4444;
      margin-top: 0.8rem;
      text-align: center;
      font-size: 0.8rem;

    .desktop-create-card {
      display: none;
    }
    @media (min-width: 768px) {
      .desktop-create-card {
        display: block;
      }

<body class="light">
<div id="root"></div>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateEmail, updatePassword, EmailAuthProvider, reauthenticateWithCredential } from "firebase/auth";
  import { getFirestore, doc, setDoc, getDoc, collection, addDoc, deleteDoc, updateDoc, query, where, getDocs, onSnapshot, orderBy, Timestamp } from "firebase/firestore";

  const firebaseConfig = {
    apiKey: "AIzaSyBvuLTt4xw0YBlr6yzejIZRMkMIgzi9uIg",
    authDomain: "advanced-todolist-app.firebaseapp.com",
    projectId: "advanced-todolist-app",
    storageBucket: "advanced-todolist-app.firebasestorage.app",
    messagingSenderId: "260669273812",
    appId: "1:260669273812:web:3fde886d6c13b43b072d41"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Priorix logo URL
  const PRIORIX_LOGO = "https://i.postimg.cc/pr9LQnWG/Priorix-Logo.png";

  let currentUser = null;
  let tasksUnsubscribe = null;
  let allTasks = [];
  let currentView = "list";
  let calendarInstance = null;
  let isCreateModalOpen = false;
  let currentUserData = null;
  let splashTimer = null;

  // ---- Splash screen helpers ----
  function showSplashScreen() {
    // Remove any existing splash
    const existing = document.querySelector('.splash-screen');
    if (existing) existing.remove();
    
    const splash = document.createElement('div');
    splash.className = 'splash-screen';
    splash.innerHTML = `
      <div class="splash-content">
        <img src="${PRIORIX_LOGO}" alt="Priorix Logo" class="splash-logo">
        <div class="splash-title">Priorix</div>

  function parseNaturalDueDate(text) {
    const lower = text.toLowerCase();
    let due = null;
    if (lower.includes("tomorrow")) { const d = new Date(); d.setDate(d.getDate() + 1); d.setHours(18,0,0,0); due = d; }
    else if (lower.includes("today")) { const d = new Date(); d.setHours(19,0,0,0); due = d; }
    else if (lower.includes("next monday")) { const d = new Date(); d.setDate(d.getDate() + ((1 + 7 - d.getDay()) % 7 || 7)); d.setHours(9,0); due = d; }
    const timeMatch = text.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
    if(timeMatch && due) { let hour = parseInt(timeMatch[1]); const minute = timeMatch[2] ? parseInt(timeMatch[2]) : 0; const meridian = timeMatch[3].toLowerCase(); if(meridian === 'pm' && hour !== 12) hour += 12; if(meridian === 'am' && hour === 12) hour = 0; due.setHours(hour, minute); }
    return due;
  }

  function formatDateDDMMYYYY(date) {
    if (!date) return '';
    const d = date.toDate ? date.toDate() : new Date(date);
    return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getFullYear()}`;
  }
  
  function renderListViewInContainer(container) {
    const filtered = [...allTasks].filter(t => !t.completed);
    filtered.sort((a, b) => {
      if (!a.dueDateTime && !b.dueDateTime) return 0;
      if (!a.dueDateTime) return 1;
      if (!b.dueDateTime) return -1;
      return a.dueDateTime.toDate() - b.dueDateTime.toDate();
    });
    const completedTasks = allTasks.filter(t => t.completed);
    const finalList = [...filtered, ...completedTasks];
    if(finalList.length === 0) { container.innerHTML = `<div style="text-align:center; padding:2rem; font-size:0.9rem;">✨ No tasks, create a smart task ✨</div>`; return; }
    container.innerHTML = "";
    finalList.forEach(t => {
      const div = document.createElement("div"); div.className = "task-item";
      const priorityIcon = t.priority === 1 ? '🔴' : (t.priority === 2 ? '🟠' : (t.priority===3 ? '🟡' : '🔵'));
      const dueStr = t.dueDateTime ? formatDateDDMMYYYY(t.dueDateTime) : '';
      div.innerHTML = `<div class="task-header"><div class="task-title-wrapper"><input type="checkbox" class="task-check" ${t.completed ? "checked" : ""} data-id="${t.id}"><span class="task-name" style="${t.completed ? 'text-decoration:line-through; opacity:0.6' : ''}">${priorityIcon} ${escapeHtml(t.title)}</span></div><button class="delete-task" data-id="${t.id}"><i class="far fa-trash-alt"></i></button></div><div class="task-meta">${dueStr ? `<span><i class="far fa-calendar-alt"></i> ${dueStr}</span>` : ''} ${t.tags?.map(tg => `<span class="meta-tag">#${escapeHtml(tg)}</span>`).join('') || ''} ${t.location ? `<span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(t.location)}</span>` : ''}</div>`;
      div.querySelector(".task-check").onchange = (e) => { e.stopPropagation(); updateDoc(doc(db,"tasks",t.id),{completed:!t.completed}); };
      div.querySelector(".delete-task").onclick = (e) => { e.stopPropagation(); deleteDoc(doc(db,"tasks",t.id)); };
      div.addEventListener("click", (e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && !e.target.closest('.delete-task')) showTaskDetails(t); });
      container.appendChild(div);
    });
  }
  
  function renderKanbanVertical(container) {
    if(allTasks.length === 0) { container.innerHTML = `<div style="text-align:center; padding:2rem; font-size:0.9rem;">✨ No tasks to display in Kanban ✨</div>`; return; }
    const todoTasks = allTasks.filter(t => !t.completed && t.priority > 2);
    const highPriorityTasks = allTasks.filter(t => !t.completed && t.priority <= 2);
    const completedTasks = allTasks.filter(t => t.completed);

    const todoContainer = document.getElementById("todoListVertical");
    const highContainer = document.getElementById("highListVertical");
    const completedContainer = document.getElementById("completedListVertical");
    todoTasks.forEach(task => { const card = document.createElement("div"); card.className = "kanban-task-card"; card.innerHTML = `<div style="font-weight:500;">${escapeHtml(task.title)}</div><div style="font-size:0.7rem; color:#64748b;">${task.dueDateTime ? formatDateDDMMYYYY(task.dueDateTime) : 'No due'}</div>`; card.onclick = () => showTaskDetails(task); todoContainer.appendChild(card); });
    highPriorityTasks.forEach(task => { const card = document.createElement("div"); card.className = "kanban-task-card"; card.innerHTML = `<div style="font-weight:500;">🔥 ${escapeHtml(task.title)}</div><div style="font-size:0.7rem; color:#64748b;">${task.dueDateTime ? formatDateDDMMYYYY(task.dueDateTime) : 'No due'}</div>`; card.onclick = () => showTaskDetails(task); highContainer.appendChild(card); });
    completedTasks.forEach(task => { const card = document.createElement("div"); card.className = "kanban-task-card"; card.innerHTML = `<div style="font-weight:500; text-decoration:line-through; opacity:0.7;">${escapeHtml(task.title)}</div><div style="font-size:0.7rem;">✓ Completed</div>`; card.onclick = () => showTaskDetails(task); completedContainer.appendChild(card); });
  }
  
  function renderCalendarInContainer(container) {
    container.innerHTML = '<div class="calendar-wrapper"><div id="fullcalendarEl"></div></div>';
    if(calendarInstance) calendarInstance.destroy();
    const events = allTasks.filter(t=>t.dueDateTime).map(t=>({title:t.title,start:t.dueDateTime.toDate(),extendedProps:{task:t}}));
    calendarInstance = new FullCalendar.Calendar(document.getElementById("fullcalendarEl"),{initialView:'dayGridMonth',events,eventClick:info=>showTaskDetails(info.event.extendedProps.task),height:'auto',headerToolbar:{left:'prev,next',center:'title',right:'today'}});
    calendarInstance.render();
  }
  
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

  onAuthStateChanged(auth, async (user) => {
    if(user) { 
      currentUser = user; 
      // Show splash immediately when user is signed in
      showSplashScreen();
      
      const docSnap = await getDoc(doc(db,"users",user.uid));
      if(!docSnap.exists()) { 
        hideSplashScreen();
        await signOut(auth); 
        renderAuth(false); 
      } else { 
        currentUserData = docSnap.data(); 
        renderDashboard(); // splash will be hidden inside renderDashboard after short delay
      }
    }
    else { 
      if(tasksUnsubscribe) tasksUnsubscribe(); 
      hideSplashScreen(); // ensure no splash stuck if logged out
      renderAuth(false); 
    }
  });
</script>
</body>
</html>
